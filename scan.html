<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FaceCheck · Site Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; padding:0; background:#020617; color:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; }
.container { max-width:500px; margin:0 auto; padding:20px 16px 40px; }
header { text-align:center; padding:20px 0 30px; border-bottom:1px solid #1e293b; margin-bottom:20px; }
.logo-text { font-size:28px; font-weight:800; letter-spacing:1px; line-height:1.2; }
.logo-regency { color:#F58C1F; }
.logo-facades { color:#8E8E8E; display:block; font-size:24px; }
.status-box { padding:20px; border-radius:12px; text-align:center; font-weight:600; font-size:16px; margin-bottom:25px; min-height:70px; display:flex; align-items:center; justify-content:center; }
.status-idle { background:#1e293b; color:#64748b; border:2px dashed #334155; }
.status-scanning { background:#fef3c7; color:#78350f; border:2px solid #f59e0b; }
.status-success { background:#064e3b; color:#6ee7b7; border:2px solid #10b981; }
.status-error { background:#7f1d1d; color:#fca5a5; border:2px solid #ef4444; }
.card { background:#1e293b; padding:25px; border-radius:14px; margin-bottom:20px; border:1px solid #293548; }
.card h2 { margin:0 0 15px; font-size:14px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; font-weight:600; }
button { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:18px; border-radius:10px; border:none; font-weight:700; font-size:16px; cursor:pointer; color:#fff; margin-bottom:10px; }
button:active { transform:scale(0.98); }
.btn-face { background:#0891b2; }
.btn-capture { background:#10b981; display:none; }
.btn-qr { background:#059669; }
#video { width:100%; border-radius:10px; display:none; margin-bottom:10px; }
#qr-reader { display:none; }
.footer { text-align:center; font-size:11px; color:#475569; margin-top:30px; }
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo-text">
<span class="logo-regency">REGENCY</span>
<span class="logo-facades">FACADES</span>
</div>
</header>
<div id="statusBox" class="status-box status-idle">Ready to sign in</div>
<div class="card">
<h2>Face Recognition</h2>
<button type="button" class="btn-face" id="btnFace" onclick="startFaceScan()"> START FACE SCAN</button>
<button type="button" class="btn-capture" id="btnCapture" onclick="captureFace()">✅ CAPTURE & SIGN IN</button>
<video id="video" autoplay muted playsinline></video>
</div>
<div class="card">
<h2>QR Code</h2>
<div id="qr-reader"></div>
<button type="button" class="btn-qr" id="btnQr" onclick="toggleQrScan()">📷 OPEN CAMERA FOR QR</button>
</div>
<div class="footer">Regency Facades © 2026</div>
</div>

<script>
const SITE_ID = "I";
const firebaseConfig = {
apiKey: "AIzaSyDtoxxIjNTNUAs36702Fvcis-ZnfTjyJyU",
authDomain: "swiftcheck-face.firebaseapp.com",
databaseURL: "https://swiftcheck-face-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "swiftcheck-face",
storageBucket: "swiftcheck-face.firebasestorage.app",
messagingSenderId: "450988754217",
appId: "1:450988754217:web:3635f97011943c51266338"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const signinsRef = db.ref('sites/' + SITE_ID + '/signins');
const statusRef = db.ref('sites/' + SITE_ID + '/status');
const faceDescriptorsRef = db.ref('sites/' + SITE_ID + '/faceDescriptors');
const operativesRef = db.ref('sites/' + SITE_ID + '/operatives');

let isFaceScanning = false, isQrScanning = false, videoStream = null, qrScanner = null;
let faceDescriptors = {}, operatives = {}, modelsLoaded = false;

async function loadModels() {
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
await Promise.all([
faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
]);
modelsLoaded = true;
}

faceDescriptorsRef.on('value', snap => {
faceDescriptors = {};
snap.forEach(child => { faceDescriptors[child.key] = child.val(); });
});

operativesRef.on('value', snap => {
operatives = {};
snap.forEach(child => { operatives[child.key] = child.val(); });
});

function showStatus(msg, type) {
const box = document.getElementById('statusBox');
box.textContent = msg;
box.className = 'status-box status-' + type;
}

async function startFaceScan() {
if (!modelsLoaded) await loadModels();
if (isQrScanning) stopQrScan();
isFaceScanning = true;
document.getElementById('btnFace').style.display = 'none';
document.getElementById('btnCapture').style.display = 'block';
showStatus('Position your face in the camera', 'scanning');

try {
videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
const video = document.getElementById('video');
video.srcObject = videoStream;
video.style.display = 'block';
await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
detectFaceLoop();
} catch (err) {
showStatus('Camera error', 'error');
stopFaceScan();
}
}

function stopFaceScan() {
isFaceScanning = false;
document.getElementById('btnFace').style.display = 'block';
document.getElementById('btnCapture').style.display = 'none';
document.getElementById('video').style.display = 'none';
if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
showStatus('Ready to sign in', 'idle');
}

async function detectFaceLoop() {
if (!isFaceScanning) return;
try {
const video = document.getElementById('video');
if (!video || video.readyState !== 4) { setTimeout(detectFaceLoop, 500); return; }
const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.3 })).withFaceLandmarks().withFaceDescriptor();
if (detection) {
const result = findBestMatch(detection.descriptor);
if (result.match) {
await recordSignin(result.match.id, result.match.name, result.match.company, 'FACE');
stopFaceScan();
} else {
showStatus('Face not recognized - try QR code', 'error');
setTimeout(() => { if (isFaceScanning) showStatus('Position your face in the camera', 'scanning'); }, 3000);
}
}
} catch (err) { console.error(err); }
if (isFaceScanning) setTimeout(detectFaceLoop, 500);
}

async function captureFace() {
showStatus('Capturing...', 'info');
try {
const video = document.getElementById('video');
const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.3 })).withFaceLandmarks().withFaceDescriptor();
if (!detection) { showStatus('No face detected', 'error'); return; }
const result = findBestMatch(detection.descriptor);
if (result.match) {
await recordSignin(result.match.id, result.match.name, result.match.company, 'FACE');
stopFaceScan();
} else {
showStatus('Face not recognized - try QR', 'error');
}
} catch (err) { showStatus('Error', 'error'); }
}

function findBestMatch(inputDescriptor) {
const THRESHOLD = 0.65;
for (const [id, data] of Object.entries(faceDescriptors)) {
const storedDescriptor = new Float32Array(data.descriptor);
const distance = faceapi.euclideanDistance(inputDescriptor, storedDescriptor);
if (distance < THRESHOLD) {
const operative = operatives[id];
if (operative) return { match: { id, name: operative.name, company: operative.company } };
}
}
return { match: null };
}

async function recordSignin(operativeId, name, company, method) {
try {
const statusSnap = await statusRef.child(operativeId).once('value');
const currentStatus = statusSnap.val();
const isOnSite = currentStatus && currentStatus.onSite;
const action = isOnSite ? 'OUT' : 'IN';

await signinsRef.push({
operativeId, operativeName: name, operativeCompany: company,
action, method, timestamp: firebase.database.ServerValue.TIMESTAMP,
date: new Date().toISOString().slice(0,10)
});

await statusRef.child(operativeId).set({
onSite: action === 'IN', lastAction: action,
lastTimestamp: firebase.database.ServerValue.TIMESTAMP, company: company
});

showStatus(action === 'IN' ? 'Thank you - signed IN ✓' : 'Thank you - signed OUT ✓', 'success');
if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
setTimeout(() => { if (!isFaceScanning && !isQrScanning) showStatus('Ready to sign in', 'idle'); }, 3000);
} catch (err) {
showStatus('Error saving', 'error');
}
}

function toggleQrScan() { if (isQrScanning) stopQrScan(); else startQrScan(); }

function startQrScan() {
if (isFaceScanning) stopFaceScan();
isQrScanning = true;
document.getElementById('btnQr').classList.add('scanning');
document.getElementById('btnQr').textContent = '⏹ STOP';
showStatus('Point at QR code', 'scanning');
document.getElementById('qr-reader').style.display = 'block';

qrScanner = new Html5Qrcode("qr-reader");
qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 240, height: 240 } },
(decodedText) => { handleQrCode(decodedText); stopQrScan(); }, () => {}
).catch(err => { showStatus('QR error', 'error'); stopQrScan(); });
}

function stopQrScan() {
isQrScanning = false;
document.getElementById('btnQr').classList.remove('scanning');
document.getElementById('btnQr').textContent = '📷 OPEN CAMERA FOR QR';
document.getElementById('qr-reader').style.display = 'none';
if (qrScanner) { try { qrScanner.stop(); } catch(e){} qrScanner = null; }
showStatus('Ready to sign in', 'idle');
}

async function handleQrCode(qrData) {
for (const [id, data] of Object.entries(operatives)) {
if (data.qrCode === qrData || id === qrData) {
await recordSignin(id, data.name, data.company, 'QR');
return;
}
}
showStatus('Unknown QR code', 'error');
}

loadModels();
</script>
</body>
</html>
