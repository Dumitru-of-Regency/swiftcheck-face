<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SwiftCheck - Site Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color:#fff; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height:100vh; }
.container { max-width:600px; margin:0 auto; padding:30px 20px; }
header { text-align:center; padding:30px 0; margin-bottom:20px; }
.logo { font-size:36px; font-weight:900; background: linear-gradient(135deg, #06b6d4 0%, #f97316 50%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
.tagline { color:#94a3b8; font-size:13px; margin-top:8px; letter-spacing: 3px; text-transform: uppercase; }
.card { background: rgba(30, 41, 59, 0.8); padding:25px; border-radius:20px; margin-bottom:20px; border: 1px solid rgba(255,255,255,0.1); }
h2 { margin:0 0 20px; font-size:13px; color:#94a3b8; text-transform:uppercase; letter-spacing:2px; font-weight:700; }
button { width:100%; padding:18px; margin:10px 0; border-radius:12px; border:none; font-weight:700; cursor:pointer; color:#fff; font-size:16px; text-transform: uppercase; letter-spacing: 1px; }
.btn-face { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); }
.btn-capture { background: linear-gradient(135deg, #10b981 0%, #059669 100%); display:none; }
.btn-qr { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
#video { width:100%; border-radius:15px; display:none; margin-bottom:15px; border: 3px solid rgba(6, 182, 212, 0.5); }
#qr-reader { display:none; border-radius:15px; overflow:hidden; }
.status-box { padding:20px; border-radius:15px; text-align:center; font-weight:600; font-size:16px; margin-bottom:25px; border: 2px solid transparent; }
.status-idle { background: rgba(30, 41, 59, 0.6); color:#94a3b8; border-color: rgba(255,255,255,0.1); }
.status-scanning { background: rgba(254, 243, 199, 0.2); color:#fbbf24; border-color: rgba(251, 191, 36, 0.3); }
.status-success { background: rgba(6, 78, 59, 0.6); color:#34d399; border-color: rgba(52, 211, 153, 0.3); }
.status-error { background: rgba(127, 29, 29, 0.6); color:#f87171; border-color: rgba(248, 113, 113, 0.3); }
.location-info { background: rgba(99, 102, 241, 0.2); color:#a5b4fc; padding:12px; border-radius:10px; margin-top:15px; font-size:13px; display:none; border: 1px solid rgba(99, 102, 241, 0.3); }
.footer { text-align:center; font-size:12px; color:#64748b; margin-top:30px; padding:20px 0; border-top: 1px solid rgba(255,255,255,0.1); }
.privacy-notice { background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.3); padding:15px; border-radius:10px; margin-bottom:20px; font-size:12px; color:#fbbf24; text-align:center; }
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">SWIFTCHECK</div>
<div class="tagline">Site Terminal</div>
</header>

<div class="privacy-notice"> Location tracking enabled for attendance verification</div>

<div id="statusBox" class="status-box status-idle">Ready to sign in</div>

<div class="card">
<h2>🎥 Face Recognition</h2>
<button type="button" class="btn-face" id="btnFace" onclick="startFaceScan()">Start Face Scan</button>
<button type="button" class="btn-capture" id="btnCapture" onclick="captureFace()">Capture & Sign In</button>
<video id="video" autoplay muted playsinline></video>
<div id="locationInfo" class="location-info"><span id="locationText">Acquiring location...</span></div>
</div>

<div class="card">
<h2> QR Code</h2>
<div id="qr-reader"></div>
<button type="button" class="btn-qr" id="btnQr" onclick="toggleQrScan()">Open Camera for QR</button>
</div>

<div class="footer">We Are A Team Together Ltd © 2026</div>
</div>

<script>
const SITE_ID = "I";
const firebaseConfig = {
apiKey: "AIzaSyDtoxxIjNTNUAs36702Fvcis-ZnfTjyJyU",
authDomain: "swiftcheck-face.firebaseapp.com",
databaseURL: "https://swiftcheck-face-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "swiftcheck-face",
storageBucket: "swiftcheck-face.firebasestorage.app",
messagingSenderId: "450988754217",
appId: "1:450988754217:web:3635f97011943c51266338"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const signinsRef = db.ref('sites/' + SITE_ID + '/signins');
const statusRef = db.ref('sites/' + SITE_ID + '/status');
const faceDescriptorsRef = db.ref('sites/' + SITE_ID + '/faceDescriptors');
const operativesRef = db.ref('sites/' + SITE_ID + '/operatives');

let isFaceScanning = false, isQrScanning = false, videoStream = null, qrScanner = null;
let faceDescriptors = {}, operatives = {}, modelsLoaded = false;
let currentLocation = null;

async function loadModels() {
const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
await Promise.all([
faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
]);
modelsLoaded = true;
}

faceDescriptorsRef.on('value', snap => { faceDescriptors = {}; snap.forEach(child => { faceDescriptors[child.key] = child.val(); }); });
operativesRef.on('value', snap => { operatives = {}; snap.forEach(child => { operatives[child.key] = child.val(); }); });

function showStatus(msg, type) {
const box = document.getElementById('statusBox');
box.textContent = msg;
box.className = 'status-box status-' + type;
}

function showLocationInfo(text) {
const locDiv = document.getElementById('locationInfo');
const locText = document.getElementById('locationText');
locText.textContent = text;
locDiv.style.display = 'block';
}

function hideLocationInfo() { document.getElementById('locationInfo').style.display = 'none'; }

function getLocation() {
return new Promise((resolve, reject) => {
if (!navigator.geolocation) { reject(new Error('Geolocation not supported')); return; }
showLocationInfo(' Acquiring location...');
navigator.geolocation.getCurrentPosition(
async (position) => {
const lat = position.coords.latitude;
const lng = position.coords.longitude;
const accuracy = position.coords.accuracy;
showLocationInfo(`📍 Location acquired (${accuracy.toFixed(0)}m accuracy)`);
try {
const address = await reverseGeocode(lat, lng);
resolve({ lat, lng, accuracy, address });
} catch (err) { resolve({ lat, lng, accuracy, address: `${lat.toFixed(4)}, ${lng.toFixed(4)}` }); }
},
(error) => { hideLocationInfo(); reject(error); },
{ enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
);
});
}

async function reverseGeocode(lat, lng) {
try {
const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, { headers: { 'User-Agent': 'SwiftCheck Attendance System' } });
const data = await response.json();
if (data.display_name) {
const addr = data.address;
const parts = [];
if (addr.road) parts.push(addr.road);
if (addr.suburb) parts.push(addr.suburb);
if (addr.city || addr.town || addr.village) parts.push(addr.city || addr.town || addr.village);
if (addr.postcode) parts.push(addr.postcode);
return parts.join(', ') || data.display_name;
}
return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
} catch (err) { return `${lat.toFixed(4)}, ${lng.toFixed(4)}`; }
}

async function startFaceScan() {
if (!modelsLoaded) await loadModels();
if (isQrScanning) stopQrScan();
try { currentLocation = await getLocation(); } catch (err) { showStatus('️ Location access denied.', 'error'); setTimeout(() => showStatus('Ready to sign in', 'idle'), 3000); return; }
isFaceScanning = true;
document.getElementById('btnFace').style.display = 'none';
document.getElementById('btnCapture').style.display = 'block';
showStatus('Position your face in the camera', 'scanning');
try {
videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
const video = document.getElementById('video');
video.srcObject = videoStream;
video.style.display = 'block';
await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
detectFaceLoop();
} catch (err) { hideLocationInfo(); showStatus('Camera error', 'error'); stopFaceScan(); }
}

function stopFaceScan() {
isFaceScanning = false;
document.getElementById('btnFace').style.display = 'block';
document.getElementById('btnCapture').style.display = 'none';
document.getElementById('video').style.display = 'none';
hideLocationInfo();
if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
currentLocation = null;
showStatus('Ready to sign in', 'idle');
}

async function detectFaceLoop() {
if (!isFaceScanning) return;
try {
const video = document.getElementById('video');
if (!video || video.readyState !== 4) { setTimeout(detectFaceLoop, 500); return; }
const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.3 })).withFaceLandmarks().withFaceDescriptor();
if (detection) {
const result = findBestMatch(detection.descriptor);
if (result.match) { await recordSignin(result.match.id, result.match.name, result.match.company, 'FACE'); stopFaceScan(); }
else { hideLocationInfo(); showStatus('Face not recognized - try QR code', 'error'); setTimeout(() => { if (isFaceScanning) showStatus('Position your face in the camera', 'scanning'); }, 3000); }
}
} catch (err) { console.error(err); }
if (isFaceScanning) setTimeout(detectFaceLoop, 500);
}

async function captureFace() {
showStatus('Capturing...', 'info');
try {
const video = document.getElementById('video');
const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.3 })).withFaceLandmarks().withFaceDescriptor();
if (!detection) { hideLocationInfo(); showStatus('No face detected', 'error'); return; }
const result = findBestMatch(detection.descriptor);
if (result.match) { await recordSignin(result.match.id, result.match.name, result.match.company, 'FACE'); stopFaceScan(); }
else { hideLocationInfo(); showStatus('Face not recognized - try QR', 'error'); }
} catch (err) { hideLocationInfo(); showStatus('Error', 'error'); }
}

function findBestMatch(inputDescriptor) {
const THRESHOLD = 0.65;
for (const [id, data] of Object.entries(faceDescriptors)) {
const storedDescriptor = new Float32Array(data.descriptor);
const distance = faceapi.euclideanDistance(inputDescriptor, storedDescriptor);
if (distance < THRESHOLD) {
const operative = operatives[id];
if (operative) return { match: { id, name: operative.name, company: operative.company } };
}
}
return { match: null };
}

async function recordSignin(operativeId, name, company, method) {
try {
const statusSnap = await statusRef.child(operativeId).once('value');
const currentStatus = statusSnap.val();
const isOnSite = currentStatus && currentStatus.onSite;
const action = isOnSite ? 'OUT' : 'IN';
const signinData = { operativeId, operativeName: name, operativeCompany: company, action, method, timestamp: firebase.database.ServerValue.TIMESTAMP, date: new Date().toISOString().slice(0,10) };
if (currentLocation) {
signinData.location = { lat: currentLocation.lat, lng: currentLocation.lng, accuracy: currentLocation.accuracy, address: currentLocation.address, timestamp: Date.now() };
}
await signinsRef.push(signinData);
await statusRef.child(operativeId).set({ onSite: action === 'IN', lastAction: action, lastTimestamp: firebase.database.ServerValue.TIMESTAMP, company: company });
const locText = currentLocation ? `\n ${currentLocation.address}` : '';
const msg = action === 'IN' ? `✅ Welcome ${name} - Signed IN${locText}` : ` Goodbye ${name} - Signed OUT${locText}`;
showStatus(msg, 'success');
if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
setTimeout(() => { if (!isFaceScanning && !isQrScanning) showStatus('Ready to sign in', 'idle'); }, 5000);
} catch (err) { hideLocationInfo(); showStatus('Error saving', 'error'); }
}

function toggleQrScan() { if (isQrScanning) stopQrScan(); else startQrScan(); }

async function startQrScan() {
if (isFaceScanning) stopFaceScan();
try { currentLocation = await getLocation(); } catch (err) { console.error('Location error:', err); }
isQrScanning = true;
document.getElementById('btnQr').textContent = 'Stop QR Scan';
showStatus('Point camera at QR code', 'scanning');
document.getElementById('qr-reader').style.display = 'block';
qrScanner = new Html5Qrcode("qr-reader");
qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 240, height: 240 } }, (decodedText) => { handleQrCode(decodedText); stopQrScan(); }, () => {}).catch(err => { hideLocationInfo(); showStatus('QR error', 'error'); stopQrScan(); });
}

function stopQrScan() {
isQrScanning = false;
document.getElementById('btnQr').textContent = 'Open Camera for QR';
document.getElementById('qr-reader').style.display = 'none';
hideLocationInfo();
if (qrScanner) { try { qrScanner.stop(); } catch(e){} qrScanner = null; }
currentLocation = null;
showStatus('Ready to sign in', 'idle');
}

async function handleQrCode(qrData) {
for (const [id, data] of Object.entries(operatives)) {
if (data.qrCode === qrData || id === qrData) { await recordSignin(id, data.name, data.company, 'QR'); return; }
}
hideLocationInfo();
showStatus('Unknown QR code', 'error');
}

loadModels();
</script>
</body>
</html>
