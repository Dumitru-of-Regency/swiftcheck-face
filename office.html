<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceCheck - Office</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; }
body { background:#020617; color:#fff; font-family:Arial,sans-serif; margin:0; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
header {
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
border-bottom:1px solid #1e293b;
margin-bottom:20px;
}
.logo { font-size:28px; font-weight:800; }
.orange { color:#F58C1F; }
.grey { color:#8E8E8E; display:block; font-size:24px; }
.badge { background:#064e3b; color:#6ee7b7; padding:5px 12px; border-radius:15px; font-size:12px; }
.stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:20px; }
.stat { background:#1e293b; padding:20px; border-radius:10px; text-align:center; }
.num { font-size:48px; font-weight:800; }
.green { color:#10b981; }
.blue { color:#38bdf8; }
.amber { color:#f59e0b; }
.purple { color:#a78bfa; }
.label { font-size:11px; color:#94a3b8; text-transform:uppercase; margin-top:10px; }
.card { background:#1e293b; padding:20px; border-radius:10px; margin-bottom:20px; }
.company-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; }
.company-item { background:#0f172a; padding:15px; border-radius:8px; border-left:4px solid #f59e0b; }
.company-name { font-weight:700; margin-bottom:5px; }
.company-count { font-size:36px; font-weight:800; color:#f59e0b; }
.controls { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
input { flex:1; padding:12px; border-radius:5px; border:1px solid #334155; background:#0f172a; color:#fff; min-width:200px; }
button { padding:12px 20px; border-radius:5px; border:none; font-weight:600; cursor:pointer; color:#fff; }
.btn-refresh { background:#4f46e5; }
.btn-export { background:#0891b2; }
.btn-clear { background:#dc2626; }
table { width:100%; border-collapse:collapse; }
th { background:#0f172a; padding:12px; text-align:left; font-size:11px; color:#94a3b8; text-transform:uppercase; }
td { padding:12px; border-bottom:1px solid #0f172a; }
tr:hover { background:#293548; }
.method-badge { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:600; }
.face { background:#164e63; color:#67e8f9; }
.qr { background:#14532d; color:#86efac; }
.action-badge { padding:4px 12px; border-radius:12px; font-size:12px; font-weight:700; }
.in { background:#064e3b; color:#6ee7b7; }
.out { background:#78350f; color:#fcd34d; }
.time { color:#94a3b8; font-family:monospace; }
.empty { text-align:center; color:#64748b; padding:40px; }
.footer { text-align:center; font-size:11px; color:#475569; margin-top:20px; }
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">
<span class="orange">REGENCY</span>
<span class="grey">FACADES</span>
</div>
<div class="badge">LIVE</div>
</header>

<div class="stats">
<div class="stat">
<div class="num green" id="onsite">0</div>
<div class="label">Currently On Site</div>
</div>
<div class="stat">
<div class="num blue" id="total">0</div>
<div class="label">Total Sign-Ins Today</div>
</div>
<div class="stat">
<div class="num amber" id="recent">0</div>
<div class="label">Last 15 Minutes</div>
</div>
<div class="stat">
<div class="num purple" id="unique">0</div>
<div class="label">Unique Operatives</div>
</div>
</div>

<div class="card">
<h2>Operatives by Company</h2>
<div class="company-grid" id="companyGrid">
<div class="empty">Loading...</div>
</div>
</div>

<div class="controls">
<input type="text" id="search" placeholder="Filter by name, company, or method...">
<button class="btn-refresh" onclick="location.reload()">Refresh</button>
<button class="btn-export" onclick="exportCSV()">Export CSV</button>
<button class="btn-clear" onclick="clearToday()">Clear Today</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Operative</th>
<th>Method</th>
<th>Action</th>
<th>Time</th>
<th>Elapsed</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="5" class="empty">Connecting...</td></tr>
</tbody>
</table>
</div>

<div class="footer">Regency Facades 2026</div>
</div>

<script>
const SITE_ID = "I";
const firebaseConfig = {
apiKey: "AIzaSyDtoxxIjNTNUAs36702Fvcis-ZnfTjyJyU",
authDomain: "swiftcheck-face.firebaseapp.com",
databaseURL: "https://swiftcheck-face-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "swiftcheck-face",
storageBucket: "swiftcheck-face.firebasestorage.app",
messagingSenderId: "450988754217",
appId: "1:450988754217:web:3635f97011943c51266338"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const signinsRef = db.ref('sites/' + SITE_ID + '/signins');
const statusRef = db.ref('sites/' + SITE_ID + '/status');

let allRecords = [];
let statusData = {};

function todayStart() {
const d = new Date();
d.setHours(0, 0, 0, 0);
return d.getTime();
}

function escapeHtml(text) {
const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
return text.replace(/[&<>"']/g, m => map[m]);
}

function timeAgo(ts) {
const s = Math.floor((Date.now() - ts) / 1000);
if (s < 60) return s + 's ago';
if (s < 3600) return Math.floor(s / 60) + 'm ago';
if (s < 86400) return Math.floor(s / 3600) + 'h ago';
return Math.floor(s / 86400) + 'd ago';
}

function render() {
const today = todayStart();
console.log('Rendering records. Total records:', allRecords.length);
console.log('Today\'s records:', allRecords.filter(r => r.timestamp >= today).length);

// Calculate stats
const todays = allRecords.filter(r => r.timestamp >= today);
const onSiteNow = Object.values(statusData).filter(s => s.onSite).length;
const totalIns = todays.filter(r => r.action === 'IN').length;
const recent = todays.filter(r => Date.now() - r.timestamp < 15 * 60 * 1000).length;
const unique = new Set(todays.map(r => r.operativeId)).size;

document.getElementById('onsite').textContent = onSiteNow;
document.getElementById('total').textContent = totalIns;
document.getElementById('recent').textContent = recent;
document.getElementById('unique').textContent = unique;

// Company breakdown
const companyCount = {};
Object.values(statusData).forEach(s => {
if (s.onSite) {
const company = s.company || 'Unknown';
companyCount[company] = (companyCount[company] || 0) + 1;
}
});

const companies = Object.entries(companyCount).sort((a, b) => b[1] - a[1]);
const grid = document.getElementById('companyGrid');

if (companies.length === 0) {
grid.innerHTML = '<div class="empty">No operatives on site</div>';
} else {
grid.innerHTML = companies.map(([c, n]) => `
<div class="company-item">
<div class="company-name">${escapeHtml(c)}</div>
<div class="company-count">${n}</div>
</div>
`).join('');
}

// Render table
const tbody = document.getElementById('tbody');
const filter = document.getElementById('search').value.toLowerCase();

// Get all today's records, apply filter, sort by newest first
let records = todays.filter(r => {
const nameMatch = r.operativeName.toLowerCase().includes(filter);
const companyMatch = (r.operativeCompany || '').toLowerCase().includes(filter);
const methodMatch = r.method.toLowerCase().includes(filter);
return nameMatch || companyMatch || methodMatch;
});

records.sort((a, b) => b.timestamp - a.timestamp);

console.log('Records to display:', records.length);
records.forEach(r => {
console.log('Record:', r.operativeName, r.method, r.action, new Date(r.timestamp).toLocaleTimeString());
});

if (records.length === 0) {
tbody.innerHTML = '<tr><td colspan="5" class="empty">No records today</td></tr>';
} else {
tbody.innerHTML = records.map(r => {
const time = new Date(r.timestamp).toLocaleTimeString();
const methodClass = r.method === 'FACE' ? 'face' : 'qr';
const actionClass = r.action === 'IN' ? 'in' : 'out';
return `
<tr>
<td>
<div style="font-weight:700;">${escapeHtml(r.operativeName)}</div>
${r.operativeCompany ? `<div style="font-size:12px; color:#F58C1F;">${escapeHtml(r.operativeCompany)}</div>` : ''}
</td>
<td><span class="method-badge ${methodClass}">${r.method}</span></td>
<td><span class="action-badge ${actionClass}">${r.action}</span></td>
<td class="time">${time}</td>
<td class="time">${timeAgo(r.timestamp)}</td>
</tr>
`;
}).join('');
}
}

// Listen for sign-in records
signinsRef.on('value', snap => {
console.log('Sign-ins snapshot received');
allRecords = [];
snap.forEach(child => {
const val = child.val();
console.log('Record:', child.key, val);
allRecords.push({ id: child.key, ...val });
});
render();
});

// Listen for status changes
statusRef.on('value', snap => {
statusData = {};
snap.forEach(child => { statusData[child.key] = child.val(); });
render();
});

document.getElementById('search').addEventListener('input', render);

function exportCSV() {
const today = todayStart();
const data = allRecords.filter(r => r.timestamp >= today);
if (data.length === 0) { alert('No records to export'); return; }

let csv = 'Date,Time,Name,Company,Method,Action\n';
data.sort((a, b) => a.timestamp - b.timestamp).forEach(r => {
const date = new Date(r.timestamp).toISOString().split('T')[0];
const time = new Date(r.timestamp).toLocaleTimeString();
csv += `"${date}","${time}","${r.operativeName}","${r.operativeCompany || ''}","${r.method}","${r.action}"\n`;
});

const blob = new Blob([csv], { type: 'text/csv' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = `facecheck-${new Date().toISOString().split('T')[0]}.csv`;
a.click();
}

async function clearToday() {
if (!confirm('Delete ALL records from today?')) return;
const today = todayStart();
const updates = {};
allRecords.forEach(r => {
if (r.timestamp >= today) updates[r.id] = null;
});
try {
await db.ref('sites/' + SITE_ID).update(updates);
alert('Cleared');
} catch (err) {
alert('Error: ' + err.message);
}
}
</script>
</body>
</html>
